name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (shell, systemd units, XML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure systemd-analyze is available
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends systemd

      - name: Run lint checks
        run: ./scripts/lint.sh

  build-iso:
    name: Build ISO
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends live-build

      - name: lb config
        working-directory: config
        run: |
          sudo lb config \
            --distribution trixie \
            --archive-areas "main contrib non-free non-free-firmware" \
            --binary-images iso-hybrid \
            --debian-installer live

      - name: lb build
        working-directory: config
        run: sudo lb build

      - name: Verify the ISO was produced
        working-directory: config
        run: |
          test -f live-image-amd64.hybrid.iso
          file live-image-amd64.hybrid.iso

      - name: Fix artifact ownership
        working-directory: config
        run: sudo chown "$(id -u):$(id -g)" live-image-amd64.hybrid.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacific-linux-iso
          path: config/live-image-amd64.hybrid.iso
          retention-days: 7
